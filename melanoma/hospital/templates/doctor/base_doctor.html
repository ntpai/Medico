<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Document{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="icon" type="image/png" href="{% static 'icons/favicon.png' %}">
    <style>
    {% block extra_styles %}
    {% endblock %}
    </style>

</head>
<body>
    <nav class="navbar">
        <p class="navbar-brand">
            <a href="{% url 'home' %}">Medico</a>
        </p>
        <!-- This dashboard does not need to check if the user is authenticated because the page needs login to view  -->
        <div>
            Welcome, Dr. {{ user.first_name }}&nbsp;&nbsp;|
            <a href="{% url 'doctor_dashboard' %}">Dashboard</a>
            <a href="#">Appointments</a>
        </div>
    </nav>
    <div id="content">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
