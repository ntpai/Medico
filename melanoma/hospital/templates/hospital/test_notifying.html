{% extends 'hospital/base_hospital.html' %}

{% block content %}
{% if messages %}
    <div style="position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px;">
        {% for message in messages %}
            <div class="animated-toast toast-{{ message.tags }}" style="position: relative; top: 0; right: 0;">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
{% endblock  %}
